services:
  db:
    image: postgres:16-alpine
    container_name: zurikaribu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: zurikaribu
      POSTGRES_PASSWORD: zurikaribu
      POSTGRES_DB: zurikaribu
    volumes:
      - zurikaribu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zurikaribu -d zurikaribu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zurikaribu_pgdata:
